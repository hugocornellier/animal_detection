name: animal_detection
description: "On-device animal detection, species classification, and body pose estimation using TensorFlow Lite."
version: 1.0.5
repository: https://github.com/hugocornellier/animal_detection

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  opencv_dart: ^2.2.1+4
  flutter_litert: ^2.3.0
  meta: ^1.17.0
  http: ^1.3.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/models/superanimal_ssdlite_float16.tflite
    - assets/models/superanimal_rtmpose_s_float16.tflite
    - assets/models/species_classifier_float16.tflite
    - assets/models/species_mapping.json
    - assets/samples/

  plugin:
    platforms:
      ios:
        dartPluginClass: AnimalDetectionDart
      android:
        dartPluginClass: AnimalDetectionDart
      macos:
        pluginClass: AnimalDetectionPlugin
      windows:
        dartPluginClass: AnimalDetectionDart
      linux:
        dartPluginClass: AnimalDetectionDart
